{% extends "base.html" %}

{% block title %}Commander Kingdom{% endblock %}

{% block content %}
  <p class="subtitle">Advanced Kingdoms — EDH Variant</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="{{ url_for('create') }}">
    <label for="name">Your name</label>
    <input
      type="text"
      id="name"
      name="name"
      placeholder="e.g. Gandalf"
      required
      maxlength="30"
      autocomplete="off"
    >

    <label for="total">Number of players (3–12)</label>
    <input
      type="number"
      id="total"
      name="total"
      min="3"
      max="12"
      value="5"
      required
    >

    <button type="submit">Create Game &amp; Get My Role</button>
  </form>
{% endblock %}
