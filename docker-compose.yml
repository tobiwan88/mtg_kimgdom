name: mtg-kingdom
services:
  mtg-kingdom:
    image: ghcr.io/astral-sh/uv:0.11.3-python3.14-trixie-slim
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - -c
      - "uv pip install --system git+https://github.com/tobiwan88/mtg_kimgdom.git && mtg-kingdom"
    ports:
      - target: 5001
        published: 5001
        protocol: tcp
